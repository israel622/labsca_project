<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASBCA - Ikorodu Axis Input</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 40%, #b22222 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .form-container { 
            width: 100%;
            max-width: 500px; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3); 
        }

        /* Container for logo layout */
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo-container img {
            width: 100%;
            max-width: 320px; /* Constrains the long horizontal logo beautifully */
            height: auto;
            object-fit: contain;
        }

        h2 { 
            margin-top: 0; 
            margin-bottom: 30px;
            color: #1e3c72; 
            text-align: center; 
            font-size: 20px; 
            font-weight: 800;
            letter-spacing: 0.5px;
            border-bottom: 3px solid #b22222; 
            padding-bottom: 12px; 
        }

        .form-group { 
            margin-bottom: 22px; 
        }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            color: #333; 
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        input, select, textarea { 
            width: 100%; 
            padding: 12px 14px; 
            border: 2px solid #e1e5eb; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-family: inherit; 
            font-size: 14px;
            background-color: #f8fafc;
            color: #333;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus { 
            outline: none;
            border-color: #2a5298;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(42, 82, 152, 0.15);
        }

        input[type="file"] {
            padding: 8px;
            background: #fff;
            cursor: pointer;
        }

        input[type="file"]::file-selector-button {
            border: none;
            background: #1e3c72;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s ease;
            font-weight: 600;
            font-size: 12px;
            margin-right: 10px;
        }

        input[type="file"]::file-selector-button:hover {
            background: #b22222;
        }

        button { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, #1e3c72 0%, #b22222 100%);
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 700;
            cursor: pointer; 
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(178, 34, 34, 0.2);
            transition: all 0.4s ease;
            margin-top: 10px;
        }

        button:hover { 
            box-shadow: 0 6px 20px rgba(30, 60, 114, 0.4);
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
        }

        ::placeholder {
            color: #a0aec0;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <!-- Official Logo integration using Flask static routing -->
        <div class="logo-container">
            <img src="{{ url_for('static', filename='lasbca.jpeg') }}" alt="LASBCA Logo">
        </div>
        
        <h2>IKORODU</h2>
        
        <form action="/add" method="POST" enctype="multipart/form-data">
            
            <!-- Field 1: C/N -->
            <div class="form-group">
                <label for="cn">C/N</label>
                <textarea id="cn" name="cn" rows="2" required placeholder="Enter Case or Contravention Number..."></textarea>
            </div>

            <!-- Field 2: Address on Property -->
            <div class="form-group">
                <label for="address">ADDRESS ON PROPERTY</label>
                <textarea id="address" name="address" rows="3" required placeholder="Enter the exact site location details..."></textarea>
            </div>

            <!-- Field 3: Contravention -->
            <div class="form-group">
                <label for="contravention">CONTRAVENTION</label>
                <textarea id="contravention" name="contravention" rows="3" required placeholder="Describe the structural violation details..."></textarea>
            </div>

            <!-- Field 4: Action Taken -->
            <div class="form-group">
                <label for="action_taken">ACTION TAKEN</label>
                <textarea id="action_taken" name="action_taken" rows="3" required placeholder="Specify enforcement steps executed..."></textarea>
            </div>

            <!-- Field 5: Picture 1 -->
            <div class="form-group">
                <label for="picture_1">PICTURE 1</label>
                <input type="file" id="picture_1" name="picture_1" accept="image/*">
            </div>

            <!-- Field 6: Picture 2 -->
            <div class="form-group">
                <label for="picture_2">PICTURE 2</label>
                <input type="file" id="picture_2" name="picture_2" accept="image/*">
            </div>

            <button type="submit">Save & Share Entry</button>
        </form>
    </div>

</body>
</html>
